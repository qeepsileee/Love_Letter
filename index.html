<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fdf6e3;
    font-family: 'Lato', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: opacity 1.2s ease;
  }

  .sunflower-icon {
    width: 120px;
    height: 120px;
    margin-bottom: 20px;
    filter: drop-shadow(0 4px 12px rgba(180,120,0,0.2));
    transition: transform 0.4s ease;
  }

  .sunflower-icon:hover { transform: scale(1.08) rotate(5deg); }

  .intro-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    color: #5c3d1e;
    letter-spacing: 2px;
    border-bottom: 1.5px solid #c8973f;
    padding-bottom: 6px;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }

  .click-hint {
    margin-top: 14px;
    font-size: 12px;
    color: #b08040;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 0.9s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #main {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    display: flex;
    align-items: stretch;
  }

  #main.visible {
    opacity: 1;
    pointer-events: all;
    transition: opacity 1.5s ease;
  }

  #left-panel {
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 40px 60px 70px;
  }

  #textContainer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    line-height: 1.85;
    color: #3d2b1a;
    margin-bottom: 50px;
  }

  .typewriter-line { min-height: 32px; }

  #timerBlock {
    border-top: 1px solid #d4a84b;
    padding-top: 22px;
  }

  #timerLabel {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9a6e3a;
    margin-bottom: 10px;
  }

  #timer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #5c3d1e;
  }

  .divider {
    width: 1px;
    background: linear-gradient(to bottom, transparent, #d4a84b 30%, #d4a84b 70%, transparent);
    align-self: stretch;
    margin: 40px 0;
  }

  #right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #treeCanvas, #petalCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  #petalCanvas { pointer-events: none; }

  .corner-deco {
    position: absolute;
    top: 30px; right: 30px;
    width: 60px; height: 60px;
    border-top: 1.5px solid #d4a84b;
    border-right: 1.5px solid #d4a84b;
    opacity: 0.5;
    pointer-events: none;
  }

  .corner-deco-bl {
    position: absolute;
    bottom: 30px; left: 30px;
    width: 40px; height: 40px;
    border-bottom: 1px solid #d4a84b;
    border-left: 1px solid #d4a84b;
    opacity: 0.4;
    pointer-events: none;
  }

  @media (max-width: 900px) {
    body { overflow: auto; height: auto; min-height: 100vh; }

    #main {
      flex-direction: column;
      overflow-y: auto;
    }

    #left-panel {
      width: 100%;
      padding: 40px 24px 24px;
    }

    .divider {
      width: auto;
      height: 1px;
      margin: 0 24px;
      background: linear-gradient(to right, transparent, #d4a84b 30%, #d4a84b 70%, transparent);
    }

    #right-panel {
      min-height: 55vh;
    }

    #textContainer {
      font-size: 19px;
      margin-bottom: 34px;
    }
  }
</style>
</head>

      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(345) translate(0,-26)"/>
      <circle r="20" fill="#5D2E0C"/>

    </g>
    <line x1="60" y1="91" x2="60" y2="118" stroke="#5c7a2a" stroke-width="4" stroke-linecap="round"/>

  <div class="intro-label">🌻 Цветы для тебя</div>

<div id="main">
  <div id="left-panel">
    <div id="textContainer"></div>
    <div id="timerBlock">
      <div id="timerLabel">Встретимся</div>
      <div id="timer">—</div>
    </div>

  <div id="right-panel">

    <canvas id="petalCanvas"></canvas>

<script>
const linesOfText = [
  "Доня, я очень верю в тебя",
  "и знаю, что у тебя всё",
  "получится.",
  "",
  "Ты невероятно красивая,",
  "умная и трудолюбивая.",
  "",
  "Пожалуйста, не забывай",
  "отдыхать и улыбаться.",
  "",
  "Я рядом и всегда буду",
  "поддерживать тебя ❤️🫶🏻"
];

const startDate = new Date("2026-05-24T15:00:00").getTime();

const intro = document.getElementById('intro');
const mainEl = document.getElementById('main');
const treeCanvas = document.getElementById('treeCanvas');
const tctx = treeCanvas.getContext('2d');
const petalCanvas = document.getElementById('petalCanvas');
const pctx = petalCanvas.getContext('2d');
const textCont = document.getElementById('textContainer');
const timerEl = document.getElementById('timer');
const rightPanel = document.getElementById('right-panel');

let W, H;
let particles = [];
let treeReady = false;
let fallInterval = null;

function resize() {
  W = treeCanvas.width = petalCanvas.width = rightPanel.offsetWidth;
  H = treeCanvas.height = petalCanvas.height = rightPanel.offsetHeight;
}

function startMain() {
  intro.style.opacity = '0';
  intro.style.pointerEvents = 'none';

  setTimeout(() => {
    intro.style.display = 'none';
    mainEl.classList.add('visible');
    resize();
    window.addEventListener('resize', resize, { passive: true });
    startTimer();
    animateTreeGrow();
  }, 1200);
}

function startTimer() {
  function tick() {
    const diff = Math.abs(Date.now() - startDate);
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    timerEl.textContent = `${d} дн.  ${String(h).padStart(2,'0')} ч  ${String(m).padStart(2,'0')} мин  ${String(s).padStart(2,'0')} с`;
  }

  tick();
  setInterval(tick, 1000);
}

function typeWriter() {
  let li = 0, ci = 0;

  function next() {
    if (li >= linesOfText.length) return;

    if (ci === 0) {
      const p = document.createElement('div');
      p.className = 'typewriter-line';
      p.id = 'tl' + li;
      textCont.appendChild(p);
    }

    const line = linesOfText[li];

    if (ci < line.length) {
      document.getElementById('tl' + li).textContent += line[ci];
      ci++;
      setTimeout(next, 48);
    } else {
      li++;
      ci = 0;
      setTimeout(next, 420);
    }
  }

  next();
}

function animateTreeGrow() {
  const cx = W * 0.5;
  const groundY = H * 0.88;
  let dotR = 0;
  const maxDotR = 14;

  function growDot() {
    tctx.clearRect(0, 0, W, H);
    dotR += 0.5;

    tctx.beginPath();
    tctx.arc(cx, groundY, dotR, 0, Math.PI * 2);
    tctx.fillStyle = '#6B3A1F';
    tctx.fill();

    if (dotR < maxDotR) {
      requestAnimationFrame(growDot);
    } else {
      setTimeout(() => buildTree(cx, groundY), 200);
    }
  }

  growDot();
}

function buildTree(cx, groundY) {
  const branchList = [];

  function collectBranch(x, y, len, angle, depth) {
    if (depth === 0) return;

    const ex = x + len * Math.cos(angle);
    const ey = y + len * Math.sin(angle);
    branchList.push({ x1: x, y1: y, x2: ex, y2: ey, depth });

    const spread = 0.34 + Math.random() * 0.08;
    const jitter = () => (Math.random() - 0.5) * 0.12;

    collectBranch(ex, ey, len * 0.72, angle - spread + jitter(), depth - 1);
    collectBranch(ex, ey, len * 0.72, angle + spread + jitter(), depth - 1);
  }

  const trunkLen = H * 0.20;
  collectBranch(cx, groundY, trunkLen, -Math.PI / 2, 9);

  const margin = 18;
  let bi = 0;

  const interval = setInterval(() => {
    if (bi < branchList.length) {
      const b = branchList[bi++];
      const x2 = Math.max(margin, Math.min(W - margin, b.x2));
      const y2 = Math.max(margin, Math.min(groundY, b.y2));

      tctx.beginPath();
      tctx.moveTo(b.x1, b.y1);
      tctx.lineTo(x2, y2);
      tctx.strokeStyle = `hsl(25, ${38 + b.depth * 4}%, ${20 + b.depth * 2}%)`;
      tctx.lineWidth = Math.max(0.7, b.depth * 0.85);
      tctx.lineCap = 'round';
      tctx.stroke();
    } else {
      clearInterval(interval);
      setTimeout(() => drawHeartFlowers(cx, groundY - H * 0.36), 300);
    }
  }, 5);
}

function drawHeartFlowers(hcx, hcy) {
  const flowersToDraw = [];

  const baseR = Math.max(4.2, Math.min(W, H) * 0.0075);
  const stepX = baseR * 2.0;
  const stepY = baseR * 1.9;

  const heartWidth = W * 0.34;
  const heartHeight = H * 0.30;

  function heartValue(nx, ny) {
    return Math.pow(nx * nx + ny * ny - 1, 3) - nx * nx * Math.pow(ny, 3);
  }

  function insideHeart(x, y) {
    let nx = (x - hcx) / (heartWidth / 2);
    let ny = (y - hcy) / (heartHeight / 2);

    ny += 0.18;
    nx *= 1.02;
    ny *= 1.08;

    return heartValue(nx, ny) <= 0;
  }

  function edgeSoftness(x, y) {
    let nx = (x - hcx) / (heartWidth / 2);
    let ny = (y - hcy) / (heartHeight / 2);
    ny += 0.18;
    return Math.abs(heartValue(nx, ny));
  }

  for (let py = hcy - heartHeight / 2; py < hcy + heartHeight / 2; py += stepY) {
    const rowShift = (Math.floor((py - (hcy - heartHeight / 2)) / stepY) % 2) * (stepX * 0.5);

    for (let px = hcx - heartWidth / 2; px < hcx + heartWidth / 2; px += stepX) {
      const xx = px + rowShift;

      if (insideHeart(xx, py)) {
        const softness = edgeSoftness(xx, py);
        const nearEdge = softness < 0.03;

        flowersToDraw.push({
          x: xx + (Math.random() - 0.5) * (nearEdge ? 2 : 5),
          y: py + (Math.random() - 0.5) * (nearEdge ? 2 : 5),
          r: baseR + Math.random() * 1.8,
          delay: Math.random() * 1800
        });

        if (!nearEdge && Math.random() < 0.42) {
          flowersToDraw.push({
            x: xx + (Math.random() - 0.5) * 8,
            y: py + (Math.random() - 0.5) * 8,
            r: baseR * (0.92 + Math.random() * 0.45),
            delay: Math.random() * 1800
          });
        }
      }
    }
  }

  for (let i = 0; i < 22; i++) {
    const side = i % 2 === 0 ? -1 : 1;
    flowersToDraw.push({
      x: hcx + side * (heartWidth * 0.18 + Math.random() * heartWidth * 0.13),
      y: hcy - heartHeight * (0.24 + Math.random() * 0.08),
      r: baseR * (0.9 + Math.random() * 0.5),
      delay: Math.random() * 1600
    });
  }

  for (let i = 0; i < 8; i++) {
    flowersToDraw.push({
      x: hcx - heartWidth * 0.42 + Math.random() * heartWidth * 0.22,
      y: hcy + heartHeight * 0.42 + Math.random() * heartHeight * 0.22,
      r: baseR * (0.75 + Math.random() * 0.4),
      delay: 1200 + Math.random() * 1500
    });
  }

  let appeared = 0;
  const trigger = Math.floor(flowersToDraw.length * 0.45);

  flowersToDraw.forEach(f => {
    setTimeout(() => {
      drawSunflowerOnTree(f.x, f.y, f.r);
      appeared++;

      if (appeared === trigger && !treeReady) {
        treeReady = true;
        typeWriter();
        startFallingSunflowers();
      }
    }, f.delay);
  });
}

function drawSunflowerOnTree(x, y, r) {
  const petals = 10;

  for (let i = 0; i < petals; i++) {
    const a = (i / petals) * Math.PI * 2;
    const px = x + Math.cos(a) * r * 1.55;
    const py = y + Math.sin(a) * r * 1.55;

    tctx.beginPath();
    tctx.ellipse(px, py, r * 0.46, r * 0.9, a, 0, Math.PI * 2);
    tctx.fillStyle = i % 2 === 0 ? '#FFD21F' : '#F2B705';
    tctx.fill();
  }

  for (let i = 0; i < petals; i++) {
    const a = (i / petals) * Math.PI * 2 + Math.PI / petals;
    const px = x + Math.cos(a) * r * 1.05;
    const py = y + Math.sin(a) * r * 1.05;

    tctx.beginPath();
    tctx.ellipse(px, py, r * 0.30, r * 0.58, a, 0, Math.PI *
