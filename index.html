<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цветы для тебя</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#fdf6e3;
  font-family:'Lato',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
#intro{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  transition:opacity 1.2s ease;
}
.sunflower-icon{
  width:120px;height:120px;
  margin-bottom:20px;
  filter:drop-shadow(0 4px 12px rgba(180,120,0,.2));
  transition:transform .4s ease;
}
.sunflower-icon:hover{transform:scale(1.08) rotate(5deg)}
.intro-label{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;
  color:#5c3d1e;
  letter-spacing:2px;
  border-bottom:1.5px solid #c8973f;
  padding-bottom:6px;
  opacity:0;
  animation:fadeUp 1s .4s forwards;
}
.click-hint{
  margin-top:14px;
  font-size:12px;
  color:#b08040;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0;
  animation:fadeUp 1s .9s forwards;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
#main{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  display:flex;
  align-items:stretch;
}
#main.visible{
  opacity:1;
  pointer-events:all;
  transition:opacity 1.5s ease;
}
#left-panel{
  width:42%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px 40px 60px 70px;
}
#textContainer{
  font-family:'Cormorant Garamond',serif;
  font-size:21px;
  line-height:1.85;
  color:#3d2b1a;
  margin-bottom:50px;
  min-height:360px;
}
.typewriter-line{min-height:32px}
#timerBlock{
  border-top:1px solid #d4a84b;
  padding-top:22px;
}
#timerLabel{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#9a6e3a;
  margin-bottom:10px;
}
#timer{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:600;
  color:#5c3d1e;
}
.divider{
  width:1px;
  background:linear-gradient(to bottom,transparent,#d4a84b 30%,#d4a84b 70%,transparent);
  align-self:stretch;
  margin:40px 0;
}
#right-panel{
  flex:1;
  position:relative;
  overflow:hidden;
  min-width:0;
}
#treeCanvas,#petalCanvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
}
#petalCanvas{pointer-events:none}
.corner-deco{
  position:absolute;
  top:30px;right:30px;
  width:60px;height:60px;
  border-top:1.5px solid #d4a84b;
  border-right:1.5px solid #d4a84b;
  opacity:.5;
  pointer-events:none;
}
.corner-deco-bl{
  position:absolute;
  bottom:30px;left:30px;
  width:40px;height:40px;
  border-bottom:1px solid #d4a84b;
  border-left:1px solid #d4a84b;
  opacity:.4;
  pointer-events:none;
}
@media(max-width:900px){
  body{overflow:auto;height:auto;min-height:100vh}
  #main{flex-direction:column;overflow-y:auto}
  #left-panel{width:100%;padding:40px 24px 24px}
  #textContainer{font-size:19px;min-height:280px;margin-bottom:30px}
  .divider{
    width:auto;height:1px;
    margin:0 24px;
    background:linear-gradient(to right,transparent,#d4a84b 30%,#d4a84b 70%,transparent);
  }
  #right-panel{min-height:62vh}
}
</style>
</head>
<body>
<div id="intro" onclick="startMain()">
  <svg class="sunflower-icon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(60,56)">
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(0) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(30) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(60) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(90) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(120) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(150) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(180) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(210) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(240) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(270) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(300) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(330) translate(0,-32)"/>
      <circle r="20" fill="#5D2E0C"/>
      <circle r="17" fill="#6B3410"/>
    </g>
    <line x1="60" y1="91" x2="60" y2="118" stroke="#5c7a2a" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <div class="intro-label">🌻 Цветы для тебя</div>
  <div class="click-hint">нажми чтобы открыть</div>
</div>

<div id="main">
  <div id="left-panel">
    <div id="textContainer"></div>
    <div id="timerBlock">
      <div id="timerLabel">Встретимся</div>
      <div id="timer">—</div>
    </div>
  </div>
  <div class="divider"></div>
  <div id="right-panel">
    <canvas id="treeCanvas"></canvas>
    <canvas id="petalCanvas"></canvas>
    <div class="corner-deco"></div>
    <div class="corner-deco-bl"></div>
  </div>
</div>

<script>
const linesOfText=[
  "Доня, я очень верю в тебя",
  "и знаю, что у тебя всё",
  "получится.",
  "",
  "Ты невероятно красивая,",
  "умная и трудолюбивая.",
  "",
  "Пожалуйста, не забывай",
  "отдыхать и улыбаться.",
  "",
  "Я рядом и всегда буду",
  "поддерживать тебя ❤️🫶🏻"
];
const startDate=new Date("2026-05-24T15:00:00").getTime();

const intro=document.getElementById('intro'),
      mainEl=document.getElementById('main'),
      treeCanvas=document.getElementById('treeCanvas'),
      tctx=treeCanvas.getContext('2d'),
      petalCanvas=document.getElementById('petalCanvas'),
      pctx=petalCanvas.getContext('2d'),
      textCont=document.getElementById('textContainer'),
      timerEl=document.getElementById('timer'),
      rightPanel=document.getElementById('right-panel');

let W,H,particles=[],started=false,flowerData=[];

function resize(){
  W=treeCanvas.width=petalCanvas.width=rightPanel.clientWidth;
  H=treeCanvas.height=petalCanvas.height=rightPanel.clientHeight;
  if(started) redrawStatic();
}

function startMain(){
  intro.style.opacity='0';
  intro.style.pointerEvents='none';
  setTimeout(()=>{
    intro.style.display='none';
    mainEl.classList.add('visible');
    started=true;
    resize();
    window.addEventListener('resize',resize);
    startTimer();
    typeWriter();
    animateBuild();
    startFallingSunflowers();
  },1200);
}

function startTimer(){
  function tick(){
    const diff=Math.abs(Date.now()-startDate);
    const d=Math.floor(diff/86400000),
          h=Math.floor((diff%86400000)/3600000),
          m=Math.floor((diff%3600000)/60000),
          s=Math.floor((diff%60000)/1000);
    timerEl.textContent=
      `${d} дн.  ${String(h).padStart(2,'0')} ч  ${String(m).padStart(2,'0')} мин  ${String(s).padStart(2,'0')} с`;
  }
  tick();
  setInterval(tick,1000);
}

function typeWriter(){
  textCont.innerHTML='';
  let li=0,ci=0;
  function next(){
    if(li>=linesOfText.length) return;
    if(ci===0){
      const p=document.createElement('div');
      p.className='typewriter-line';
      p.id='tl'+li;
      textCont.appendChild(p);
    }
    const line=linesOfText[li];
    if(ci<line.length){
      document.getElementById('tl'+li).textContent+=line[ci];
      ci++; setTimeout(next,48);
    }else{
      li++; ci=0; setTimeout(next,420);
    }
  }
  next();
}

function getScene(){
  const cx=W*.5;
  const trunkBottomY=H*.92;
  const heartCX=W*.5;
  const heartCY=H*.44;
  const heartW=Math.min(W*.70,H*.78);
  const heartH=Math.min(H*.54,W*.58);
  const trunkTopY=heartCY+heartH*.34;
  return{cx,trunkBottomY,heartCX,heartCY,heartW,heartH,trunkTopY};
}

// Маска сердца: перевёрнута и подогнана по верху
function insideHeart(x,y,cx,cy,w,h){
  let nx=(x-cx)/(w/2);
  let ny=(y-cy)/(h/2);

  nx=-nx;
  ny=-ny;

  nx*=1.00;
  ny-=0.18;
  ny*=0.92;

  const v=Math.pow(nx*nx+ny*ny-1,3)-nx*nx*Math.pow(ny,3);
  return v<=0;
}

function createFlowers(){
  const {heartCX,heartCY,heartW,heartH}=getScene();
  const flowers=[];
  const baseR=Math.max(4.7,Math.min(W,H)*0.0082);
  const step=baseR*1.62;

  for(let y=heartCY-heartH*.56;y<=heartCY+heartH*.54;y+=step){
    const shift=((Math.round((y-(heartCY-heartH*.56))/step))%2)*(step*.5);
    for(let x=heartCX-heartW*.53;x<=heartCX+heartW*.53;x+=step){
      const xx=x+shift;
      if(insideHeart(xx,y,heartCX,heartCY,heartW,heartH)){
        flowers.push({
          x:xx+(Math.random()-.5)*step*.20,
          y:y +(Math.random()-.5)*step*.20,
          r:baseR*(.92+Math.random()*.24)
        });
      }
    }
  }

  const extra=Math.floor(flowers.length*.45);
  for(let i=0;i<extra;i++){
    const f=flowers[Math.floor(Math.random()*flowers.length)];
    const nx=f.x+(Math.random()-.5)*step*.70;
    const ny=f.y+(Math.random()-.5)*step*.70;
    if(insideHeart(nx,ny,heartCX,heartCY,heartW,heartH)){
      flowers.push({
        x:nx,y:ny,
        r:baseR*(.74+Math.random()*.34)
      });
    }
  }
  return flowers;
}

function drawSunflower(ctx,x,y,r){
  const n=10;
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2;
    const px=x+Math.cos(a)*r*1.52;
    const py=y+Math.sin(a)*r*1.52;
    ctx.beginPath();
    ctx.ellipse(px,py,r*.43,r*.88,a,0,Math.PI*2);
    ctx.fillStyle=i%2===0?'#FFD21F':'#F2B200';
    ctx.fill();
  }
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2+Math.PI/n;
    const px=x+Math.cos(a)*r*1.02;
    const py=y+Math.sin(a)*r*1.02;
    ctx.beginPath();
    ctx.ellipse(px,py,r*.27,r*.52,a,0,Math.PI*2);
    ctx.fillStyle='#FFE15A';
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(x,y,r*.92,0,Math.PI*2);
  ctx.fillStyle='#3E1800';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x,y,r*.60,0,Math.PI*2);
  ctx.fillStyle='#5A2600';
  ctx.fill();
}

function drawTreeBase(){
  const {cx,trunkBottomY,heartCX,heartCY,heartW,heartH,trunkTopY}=getScene();
  tctx.beginPath();
  tctx.moveTo(cx,trunkBottomY);
  tctx.lineTo(cx,trunkTopY);
  tctx.strokeStyle='#8B4513';
  tctx.lineWidth=Math.max(6,Math.min(W,H)*0.0075);
  tctx.lineCap='round';
  tctx.stroke();

  tctx.beginPath();
  tctx.arc(cx,trunkBottomY,Math.max(7,Math.min(W,H)*0.0105),0,Math.PI*2);
  tctx.fillStyle='#6B3410';
  tctx.fill();

  function branch(x,y,angle,len,depth){
    if(depth<=0||len<2) return;
    const ex=x+Math.cos(angle)*len;
    const ey=y+Math.sin(angle)*len;
    tctx.beginPath();
    tctx.moveTo(x,y);
    tctx.lineTo(ex,ey);
    tctx.strokeStyle=`hsl(25, ${26+depth*4}%, ${24+depth*2}%)`;
    tctx.lineWidth=Math.max(.42,depth*.52);
    tctx.lineCap='round';
    tctx.stroke();
    const spread=.3+Math.random()*.08;
    const jitter=()=> (Math.random()-.5)*.11;
    branch(ex,ey,angle-spread+jitter(),len*.72,depth-1);
    branch(ex,ey,angle+spread+jitter(),len*.72,depth-1);
  }

  const by=heartCY-heartH*.02;
  const len=Math.min(heartW,heartH)*.34;
  branch(heartCX,by,-Math.PI/2,    len,      8);
  branch(heartCX,by,-Math.PI/2-.62,len*.98, 8);
  branch(heartCX,by,-Math.PI/2+.62,len*.98, 8);
}

function redrawStatic(){
  tctx.clearRect(0,0,W,H);
  drawTreeBase();
  flowerData=createFlowers();
  for(const f of flowerData) drawSunflower(tctx,f.x,f.y,f.r);
}

function animateBuild(){
  tctx.clearRect(0,0,W,H);
  drawTreeBase();
  flowerData=createFlowers();
  let i=0;
  function step(){
    for(let j=0;j<5&&i<flowerData.length;j++,i++){
      const f=flowerData[i];
      drawSunflower(tctx,f.x,f.y,f.r);
    }
    if(i<flowerData.length) requestAnimationFrame(step);
  }
  step();
}

function startFallingSunflowers(){
  setInterval(()=>{
    if(particles.length<10){
      particles.push({
        x:W*(.08+Math.random()*.84),
        y:-12,
        vx:(Math.random()-.5)*.5,
        vy:.55+Math.random()*.7,
        r:4+Math.random()*2.4,
        angle:Math.random()*Math.PI*2,
        spin:(Math.random()-.5)*.04
      });
    }
  },900);

  function anim(){
    pctx.clearRect(0,0,W,H);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;
      p.y+=p.vy;
      p.angle+=p.spin;
      pctx.save();
      pctx.translate(p.x,p.y);
      pctx.rotate(p.angle);
      drawSunflower(pctx,0,0,p.r);
      pctx.restore();
      if(p.y>H+20) particles.splice(i,1);
    }
    requestAnimationFrame(anim);
  }
  anim();
}

resize();
</script>
</body>
</html>
