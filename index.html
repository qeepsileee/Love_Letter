<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores Para Ti</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fdf6e3;
    font-family: 'Lato', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: opacity 1.2s ease;
  }
  .sunflower-icon {
    width: 120px;
    height: 120px;
    margin-bottom: 20px;
    filter: drop-shadow(0 4px 12px rgba(180,120,0,0.2));
    transition: transform 0.4s ease;
  }
  .sunflower-icon:hover { transform: scale(1.08) rotate(5deg); }
  .intro-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    color: #5c3d1e;
    letter-spacing: 2px;
    border-bottom: 1.5px solid #c8973f;
    padding-bottom: 6px;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }
  .click-hint {
    margin-top: 14px;
    font-size: 12px;
    color: #b08040;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 0.9s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #main {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    display: flex;
    align-items: stretch;
  }
  #main.visible {
    opacity: 1;
    pointer-events: all;
    transition: opacity 1.5s ease;
  }
  #left-panel {
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 40px 60px 70px;
  }
  #textContainer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    line-height: 1.85;
    color: #3d2b1a;
    margin-bottom: 50px;
  }
  .typewriter-line { min-height: 32px; }
  #timerBlock {
    border-top: 1px solid #d4a84b;
    padding-top: 22px;
  }
  #timerLabel {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9a6e3a;
    margin-bottom: 10px;
  }
  #timer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #5c3d1e;
  }
  .divider {
    width: 1px;
    background: linear-gradient(to bottom, transparent, #d4a84b 30%, #d4a84b 70%, transparent);
    align-self: stretch;
    margin: 40px 0;
  }
  #right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #treeCanvas, #petalCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #petalCanvas { pointer-events: none; }
  .corner-deco {
    position: absolute;
    top: 30px; right: 30px;
    width: 60px; height: 60px;
    border-top: 1.5px solid #d4a84b;
    border-right: 1.5px solid #d4a84b;
    opacity: 0.5;
    pointer-events: none;
  }
  .corner-deco-bl {
    position: absolute;
    bottom: 30px; left: 30px;
    width: 40px; height: 40px;
    border-bottom: 1px solid #d4a84b;
    border-left: 1px solid #d4a84b;
    opacity: 0.4;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- INTRO -->

      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(180) translate(0,-32)"/>

      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(225) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(255) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(285) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(315) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(345) translate(0,-26)"/>
      <circle r="20" fill="#5D2E0C"/>
      <circle r="17" fill="#6B3410"/>
      <circle cx="0"  cy="-9"  r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="8"  cy="-5"  r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="8"  cy="5"   r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="0"  cy="9"   r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="-8" cy="5"   r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="-8" cy="-5"  r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="0"  cy="0"   r="3"   fill="#4a2008" opacity="0.9"/>
    </g>
    <line x1="60" y1="91" x2="60" y2="118" stroke="#5c7a2a" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="52" cy="108" rx="9" ry="5" fill="#6a8f30" transform="rotate(-20,52,108)"/>
  </svg>
  <!-- ВЕРНУЛИ ИСПАНСКИЕ ФРАЗЫ -->
  <div class="intro-label">🌻 Flores Para Ti</div>
  <div class="click-hint">toca para abrir</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="left-panel">
    <div id="textContainer"></div>
    <div id="timerBlock">
      <!-- Тоже возвращаем оригинальный текст -->
      <div id="timerLabel">Mi amor por ti comenzó hace...</div>
      <div id="timer">—</div>
    </div>
  </div>
  <div class="divider"></div>
  <div id="right-panel">
    <canvas id="treeCanvas"></canvas>
    <canvas id="petalCanvas"></canvas>
    <div class="corner-deco"></div>
    <div class="corner-deco-bl"></div>
  </div>
</div>

<script>
const linesOfText = [
  "Доня, я очень верю в тебя",
  "и знаю, что у тебя всё",
  "получится.",
  "",
  "Ты невероятно красивая,",
  "умная и трудолюбивая.",
  "",
  "Пожалуйста, не забывай",
  "отдыхать и улыбаться.",
  "",
  "Я рядом и всегда буду",
  "поддерживать тебя ❤️🫶🏻"
];

// ТАЙМЕР НА 24.05.2026 15:00
const startDate = new Date("2026-05-24T15:00:00").getTime();

const intro      = document.getElementById('intro');
const mainEl     = document.getElementById('main');
const treeCanvas = document.getElementById('treeCanvas');
const tctx       = treeCanvas.getContext('2d');
const petalCanvas= document.getElementById('petalCanvas');
const pctx       = petalCanvas.getContext('2d');
const textCont   = document.getElementById('textContainer');
const timerEl    = document.getElementById('timer');
const rightPanel = document.getElementById('right-panel');

let W, H;
let particles = [];
let treeReady = false;

function resize() {
  W = treeCanvas.width  = petalCanvas.width  = rightPanel.offsetWidth;
  H = treeCanvas.height = petalCanvas.height = rightPanel.offsetHeight;
}

function startMain() {
  intro.style.opacity = '0';
  intro.style.pointerEvents = 'none';
  setTimeout(() => {
    intro.style.display = 'none';
    mainEl.classList.add('visible');
    resize();
    window.addEventListener('resize', resize);
    startTimer();
    animateTreeGrow();
  }, 1200);
}

function startTimer() {
  function tick() {
    const diff = Math.abs(Date.now() - startDate);
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    timerEl.textContent = `${d} días  ${String(h).padStart(2,'0')} h  ${String(m).padStart(2,'0')} m  ${String(s).padStart(2,'0')} s`;
  }
  tick();
  setInterval(tick, 1000);
}

/* дальше у тебя код без изменений:

   drawFallingSunflower, startFallingSunflowers

</script>
</body>
</html>
