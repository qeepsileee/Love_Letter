<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Цветы для тебя</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #fdf6e3;
    font-family: 'Lato', sans-serif;
  }

  #intro {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    transition: opacity 1.2s ease;
    z-index: 10;
    padding: 20px;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }

  .sunflower-icon {
    width: clamp(80px, 18vw, 120px);
    height: clamp(80px, 18vw, 120px);
    margin-bottom: clamp(12px, 3vw, 20px);
    filter: drop-shadow(0 4px 12px rgba(180,120,0,0.2));
    transition: transform 0.4s ease;
  }
  .sunflower-icon:hover { transform: scale(1.08) rotate(5deg); }

  .intro-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 4.5vw, 26px);
    color: #5c3d1e; letter-spacing: 2px;
    border-bottom: 1.5px solid #c8973f;
    padding-bottom: 6px;
    opacity: 0; animation: fadeUp 1s 0.4s forwards;
    text-align: center;
  }
  .click-hint {
    margin-top: clamp(8px, 2vw, 14px);
    font-size: clamp(9px, 2vw, 12px);
    color: #b08040; letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0; animation: fadeUp 1s 0.9s forwards;
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #main {
    position: fixed; inset: 0;
    opacity: 0; pointer-events: none;
    display: flex; flex-direction: row;
    align-items: stretch;
  }
  #main.visible {
    opacity: 1; pointer-events: all;
    transition: opacity 1.5s ease;
  }

  #left-panel {
    width: 42%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: clamp(30px,5vh,60px) clamp(20px,3vw,40px)
             clamp(30px,5vh,60px) clamp(24px,5vw,70px);
    overflow-y: auto;
  }

  #textContainer {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 2.2vw, 21px);
    line-height: 1.85;
    color: #3d2b1a;
    margin-bottom: clamp(24px, 4vh, 50px);
  }
  .typewriter-line { min-height: clamp(22px, 3.5vh, 32px); }

  #timerBlock {
    border-top: 1px solid #d4a84b;
    padding-top: clamp(14px,2.5vh,22px);
    flex-shrink: 0;
  }
  #timerLabel {
    font-size: clamp(9px,1.5vw,12px); letter-spacing: 2px;
    text-transform: uppercase; color: #9a6e3a; margin-bottom: 8px;
  }
  #timer {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 2vw, 22px);
    font-weight: 600; color: #5c3d1e;
  }

  .divider {
    width: 1px; flex-shrink: 0;
    background: linear-gradient(to bottom, transparent, #d4a84b 30%, #d4a84b 70%, transparent);
    align-self: stretch; margin: 40px 0;
  }

  #right-panel { flex: 1; position: relative; overflow: hidden; }

  #treeCanvas, #petalCanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; display: block;
  }
  #petalCanvas { pointer-events: none; }

  .corner-deco {
    position: absolute; top: 30px; right: 30px;
    width: 60px; height: 60px;
    border-top: 1.5px solid #d4a84b;
    border-right: 1.5px solid #d4a84b;
    opacity: 0.5; pointer-events: none;
  }
  .corner-deco-bl {
    position: absolute; bottom: 30px; left: 30px;
    width: 40px; height: 40px;
    border-bottom: 1px solid #d4a84b;
    border-left: 1px solid #d4a84b;
    opacity: 0.4; pointer-events: none;
  }

  @media (max-width: 600px), (orientation: portrait) {
    #main { flex-direction: column; }

    #left-panel {
      width: 100%; order: 2;
      padding: 14px 20px 20px 20px;
      justify-content: flex-start;
      max-height: 42vh;
    }
    .divider {
      order: 2; width: 80%; height: 1px;
      align-self: center; margin: 0 auto;
      background: linear-gradient(to right, transparent, #d4a84b 30%, #d4a84b 70%, transparent);
    }
    #right-panel { order: 1; flex: none; height: 56vh; width: 100%; }
    #textContainer { font-size: clamp(13px, 3.8vw, 17px); margin-bottom: 14px; }
    #timer { font-size: clamp(12px, 3.2vw, 16px); }
    .corner-deco, .corner-deco-bl { display: none; }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" onclick="startMain()">
  <svg class="sunflower-icon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(60,56)">
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(0)   translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(30)  translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(60)  translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(90)  translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(120) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(150) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(180) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(210) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(240) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(270) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#F5C518" opacity="0.9" transform="rotate(300) translate(0,-32)"/>
      <ellipse rx="8" ry="22" fill="#E8B800" opacity="0.9" transform="rotate(330) translate(0,-32)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(15)  translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(45)  translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(75)  translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(105) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(135) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(165) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(195) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(225) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(255) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(285) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(315) translate(0,-26)"/>
      <ellipse rx="5" ry="15" fill="#FFD740" opacity="0.7" transform="rotate(345) translate(0,-26)"/>
      <circle r="20" fill="#5D2E0C"/>
      <circle r="17" fill="#6B3410"/>
      <circle cx="0"  cy="-9"  r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="8"  cy="-5"  r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="8"  cy="5"   r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="0"  cy="9"   r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="-8" cy="5"   r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="-8" cy="-5"  r="2.5" fill="#4a2008" opacity="0.8"/>
      <circle cx="0"  cy="0"   r="3"   fill="#4a2008" opacity="0.9"/>
    </g>
    <line x1="60" y1="91" x2="60" y2="118" stroke="#5c7a2a" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="52" cy="108" rx="9" ry="5" fill="#6a8f30" transform="rotate(-20,52,108)"/>
  </svg>
  <div class="intro-label">🌻 Цветы для тебя</div>
  <div class="click-hint">нажми чтобы открыть</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="left-panel">
    <div id="textContainer"></div>
    <div id="timerBlock">
      <div id="timerLabel">Встретимся через...</div>
      <div id="timer">—</div>
    </div>
  </div>
  <div class="divider"></div>
  <div id="right-panel">
    <canvas id="treeCanvas"></canvas>
    <canvas id="petalCanvas"></canvas>
    <div class="corner-deco"></div>
    <div class="corner-deco-bl"></div>
  </div>
</div>

<script>
var LINES = [
  "Доня, я очень верю в тебя",
  "и знаю, что у тебя всё",
  "получится.",
  "",
  "Ты невероятно красивая,",
  "умная и трудолюбивая.",
  "",
  "Пожалуйста, не забывай",
  "отдыхать и улыбаться.",
  "",
  "Я рядом и всегда буду",
  "поддерживать тебя ❤️🫶🏻"
];
var MEET_DATE = new Date("2026-05-24T15:00:00").getTime();

var introEl    = document.getElementById('intro');
var mainEl     = document.getElementById('main');
var treeCanvas = document.getElementById('treeCanvas');
var tctx       = treeCanvas.getContext('2d');
var petalCanvas= document.getElementById('petalCanvas');
var pctx       = petalCanvas.getContext('2d');
var textCont   = document.getElementById('textContainer');
var timerEl    = document.getElementById('timer');
var rightPanel = document.getElementById('right-panel');

var W = 0, H = 0;
var particles  = [];
var allFlowPts = [];
var treeReady  = false;

function isMobile() {
  return window.innerWidth <= 600 || window.innerHeight > window.innerWidth;
}

function resize() {
  W = treeCanvas.width  = petalCanvas.width  = rightPanel.offsetWidth;
  H = treeCanvas.height = petalCanvas.height = rightPanel.offsetHeight;
}

function startMain() {
  introEl.classList.add('hidden');
  setTimeout(function () {
    introEl.style.display = 'none';
    mainEl.classList.add('visible');
    resize();
    window.addEventListener('resize', resize);
    startTimer();
    animateGrow();
  }, 1200);
}

function startTimer() {
  function tick() {
    var diff = Math.abs(Date.now() - MEET_DATE);
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000)  / 60000);
    var s = Math.floor((diff % 60000)    / 1000);
    timerEl.textContent =
      d + ' дн.  ' +
      String(h).padStart(2,'0') + ' ч  ' +
      String(m).padStart(2,'0') + ' мин  ' +
      String(s).padStart(2,'0') + ' с';
  }
  tick();
  setInterval(tick, 1000);
}

function typeWriter() {
  var li = 0, ci = 0;
  function next() {
    if (li >= LINES.length) return;
    if (ci === 0) {
      var el = document.createElement('div');
      el.className = 'typewriter-line';
      el.id = 'tl' + li;
      textCont.appendChild(el);
    }
    var line = LINES[li];
    if (ci < line.length) {
      document.getElementById('tl' + li).textContent += line[ci++];
      setTimeout(next, 48);
    } else { li++; ci = 0; setTimeout(next, 420); }
  }
  next();
}

function animateGrow() {
  var cx      = W * 0.5;
  var groundY = H * 0.88;
  var dotR    = 0;
  function step() {
    tctx.clearRect(0, 0, W, H);
    dotR += 0.55;
    tctx.beginPath();
    tctx.arc(cx, groundY, dotR, 0, Math.PI * 2);
    tctx.fillStyle = '#6B3A1F';
    tctx.fill();
    if (dotR < 15) requestAnimationFrame(step);
    else setTimeout(function () { buildAllTrees(cx, groundY); }, 200);
  }
  step();
}

function collectTree(ox, oy, trunkLen, startAngle, maxDepth, branchList, flowerPts) {
  function walk(x, y, len, angle, d) {
    if (d === 0) return;
    var ex  = x + len * Math.cos(angle);
    var ey  = y + len * Math.sin(angle);
    var mg  = 6;
    var cex = Math.max(mg, Math.min(W - mg, ex));
    var cey = Math.max(mg, Math.min(H - mg, ey));

    branchList.push({ x1: x, y1: y, x2: cex, y2: cey, d: d });

    if (d <= 2) flowerPts.push({ x: cex, y: cey, depth: d });
    if (d >= 3 && d <= 5) flowerPts.push({ x: (x + cex) / 2, y: (y + cey) / 2, depth: d });

    var sp  = 0.36 + Math.random() * 0.06;
    var jit = function () { return (Math.random() - 0.5) * 0.10; };
    walk(cex, cey, len * 0.70, angle - sp + jit(), d - 1);
    walk(cex, cey, len * 0.70, angle + sp + jit(), d - 1);
  }
  walk(ox, oy, trunkLen, startAngle, maxDepth);
}

function buildAllTrees(cx, groundY) {
  allFlowPts = [];
  var sc  = isMobile() ? 0.78 : 1.0;
  var DEG = Math.PI / 180;

  var trees = [
    { ox: cx, oy: groundY, angle: -90  * DEG, trunk: H * 0.22 * sc, depth: 9 },
    { ox: cx, oy: groundY, angle: -120 * DEG, trunk: H * 0.18 * sc, depth: 8 },
    { ox: cx, oy: groundY, angle: -60  * DEG, trunk: H * 0.18 * sc, depth: 8 }
  ];

  var allBranches = [];
  trees.forEach(function (t) {
    var pts = [];
    collectTree(t.ox, t.oy, t.trunk, t.angle, t.depth, allBranches, pts);
    pts.forEach(function (p) { allFlowPts.push(p); });
  });

  allBranches.sort(function () { return Math.random() - 0.5; });

  var bi = 0;
  var iv = setInterval(function () {
    if (bi < allBranches.length) {
      var b = allBranches[bi++];
      tctx.beginPath();
      tctx.moveTo(b.x1, b.y1);
      tctx.lineTo(b.x2, b.y2);
      tctx.strokeStyle = 'hsl(25,' + (38 + b.d * 4) + '%,' + (20 + b.d * 2) + '%)';
      tctx.lineWidth   = Math.max(0.5, b.d * 0.82);
      tctx.lineCap     = 'round';
      tctx.stroke();
    } else {
      clearInterval(iv);
      setTimeout(placeFlowers, 300);
    }
  }, 4);
}

function placeFlowers() {
  var pts = allFlowPts.slice().sort(function () { return Math.random() - 0.5; });
  var sel = pts.filter(function (_, i) { return i % 2 === 0; });

  var total    = sel.length;
  var trigger  = Math.floor(total * 0.5);
  var appeared = 0;

  sel.forEach(function (pt, i) {
    setTimeout(function () {
      var r;
      if      (pt.depth <= 1) r = 3.5 + Math.random() * 1.5;
      else if (pt.depth <= 2) r = 4.5 + Math.random() * 2.0;
      else if (pt.depth <= 3) r = 5.0 + Math.random() * 2.0;
      else                    r = 5.5 + Math.random() * 2.5;
      if (isMobile()) r *= 0.78;

      drawSunflower(tctx, pt.x, pt.y, r);
      appeared++;
      if (appeared === trigger && !treeReady) {
        treeReady = true;
        typeWriter();
        startFalling();
      }
    }, i * 13 + Math.random() * 20);
  });
}

// Статичный подсолнечник (для дерева)
function drawSunflower(ctx, x, y, r) {
  var nP = 8;
  for (var i = 0; i < nP; i++) {
    var a  = (i / nP) * Math.PI * 2;
    var px = x + Math.cos(a) * r * 1.55;
    var py = y + Math.sin(a) * r * 1.55;
    ctx.beginPath();
    ctx.ellipse(px, py, r * 0.5, r * 0.88, a, 0, Math.PI * 2);
    ctx.fillStyle = i % 2 === 0 ? '#FFD000' : '#F5B800';
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#3E1C00';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, r * 0.62, 0, Math.PI * 2);
  ctx.fillStyle = '#5A2800';
  ctx.fill();
}

// Жёлтое сердечко (для падающих частиц)
function drawHeart(ctx, x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(r / 10, r / 10); // базовый размер ~10

  ctx.beginPath();
  ctx.moveTo(0, -3);
  ctx.bezierCurveTo(5, -8, 12, -4, 12, 2);
  ctx.bezierCurveTo(12, 8, 6, 12, 0, 15);
  ctx.bezierCurveTo(-6, 12, -12, 8, -12, 2);
  ctx.bezierCurveTo(-12, -4, -5, -8, 0, -3);
  ctx.closePath();

  ctx.fillStyle   = '#FFD54F';
  ctx.strokeStyle = '#FBC02D';
  ctx.lineWidth   = 1.2;
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function startFalling() {
  // БОЛЬШЕ СЕРДЕЧЕК
  var maxP = isMobile() ? 20 : 30;

  // Быстрее спавн
  setInterval(function () {
    if (particles.length < maxP) {
      particles.push({
        x:     W * (0.1 + Math.random() * 0.8),
        y:     -20,
        vx:    (Math.random() - 0.5) * 0.6,
        vy:    0.6 + Math.random() * 1.0,
        // КРУПНЕЕ СЕРДЕЧКИ
        r:     (isMobile() ? 4 : 5) + Math.random() * 4,
        angle: Math.random() * Math.PI * 2,
        spin:  (Math.random() - 0.5) * 0.05
      });
    }
  }, 80);

  function loop() {
    pctx.clearRect(0, 0, W, H);
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;

      pctx.save();
      pctx.translate(p.x, p.y);
      pctx.rotate(p.angle);
      drawHeart(pctx, 0, 0, p.r);
      pctx.restore();

      if (p.y > H + 40) particles.splice(i, 1);
    }
    requestAnimationFrame(loop);
  }
  loop();
}

resize();
</script>
</body>
</html>
